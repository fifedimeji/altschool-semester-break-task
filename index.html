<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <title>Sign Up | Individual</title>
</head>
<body>
    <div class="main">
        <div class="cta-card">
            <div id="logo">
                <img src="Logo.png" alt="business logo" width="77px">
            </div>

            <div class="cta-header">
                <h1>For Individuals</h1>
            </div>

            <div class="cta-content">
                <p>Start benefiting from the wellness experience. For companies looking on increasing productivity, and improving organization wellness.</p>
            </div>
        </div>

        <div class="sign-up-card">
            <form id="sign-up-form">
                <div class="form-entry">
                    <label for="first-name">First Name</label>
                    <input type="text" placeholder=" " required>
                </div>

                <div class="form-entry">
                    <label for="last-name">Last Name</label>
                    <input type="text" placeholder=" " required>
                </div>

                <div class="form-entry">
                    <label for="gender">Gender</label>
                    <select name="gender" id="gender" required>
                        <option value="" disabled hidden selected></option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="form-entry">
                    <label for="dob">Date of Birth</label>
                    <input type="text" id="dob" placeholder="Select date" required>
                </div>

                <div class="form-entry">
                    <label for="weight">Weight (KG)</label>
                    <input type="text" class="input-field" inputmode="decimal" placeholder="0.00" required pattern="^\d+(\.\d{1,2})?$">
                </div>

                <div class="form-entry">
                    <label for="height">Height (CM)</label>
                    <input type="text" class="input-field" inputmode="decimal" placeholder="0.00" required pattern="^\d+(\.\d{1,2})?$">
                </div>

                <div class="long-input">
                    <div class="form-entry">
                        <label for="activity">Activity Level</label>
                        <select name="activity" id="activity-level" required>
                            <option value="" disabled hidden selected></option>
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                        </select>
                    </div>

                    <div class="form-entry">
                        <label for="password">Password</label>
                        <input type="password" id="password" required minlength="8">
                    </div>

                    <div class="form-entry">
                        <input type="submit" value="Register" class="btn">
                    </div>
                </div>
                

                
            </form>
            <div class="terms">
                <p>By clicking Register, you agree to our <a href="#">Terms of Use</a> and our <a href="#">Privacy Policy</a>.</p>
            </div>
        </div>

        
    </div>


    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
    flatpickr("#dob");
    </script>
</body>
</html>
